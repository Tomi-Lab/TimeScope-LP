<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeScope Feature - Font Adjustment</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background-color: #ffffff; height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Inter', sans-serif; overflow: hidden; flex-direction: column; -webkit-font-smoothing: antialiased; }
        
        .calendar-wrapper {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 450px;
        }

        .calendar-window {
            background-color: #ffffff;
            width: 380px;
            padding: 24px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.06), 0 0 0 1px rgba(0,0,0,0.03);
            position: relative;
            transform-origin: center;
            transition: transform 0.7s cubic-bezier(0.25, 1, 0.4, 1);
        }

        /* Scaling Classes */
        .size-normal { transform: scale(1); }
        .size-small { transform: scale(0.85); }
        .size-large { transform: scale(1.15); }

        .header { font-size: 1.15rem; font-weight: 700; color: #18181b; margin-bottom: 20px; text-align: left; padding-left: 4px; letter-spacing: -0.01em; }
        .weekdays { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; font-size: 0.8rem; font-weight: 600; color: #71717a; margin-bottom: 8px; }
        .weekdays div:nth-child(1) { color: #e11d48; } .weekdays div:nth-child(7) { color: #2563eb; }
        
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); row-gap: 6px; column-gap: 2px; }
        .day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 0.95rem; font-weight: 500; color: #18181b; position: relative; z-index: 1; }
        .day:nth-child(7n+1) { color: #e11d48; } .day:nth-child(7n) { color: #2563eb; }
        .day.empty { pointer-events: none; }
        
        /* Highlight logic from Hero */
        .day::before { content: ''; position: absolute; top: 0; bottom: 0; left: 0; right: 0; background-color: transparent; z-index: -2; }
        .day.selected { color: #18181b; }
        .day.selected::before { background-color: rgba(59, 130, 246, 0.15); }
        .day.selected.first::before { left: 50%; } .day.selected.last::before { right: 50%; }
        .day.selected.first::after, .day.selected.last::after { content: ''; position: absolute; top: 0; bottom: 0; left: 0; right: 0; background-color: #5a92e6; border-radius: 50%; z-index: -1; }
        .day.selected.first, .day.selected.last { color: #ffffff !important; font-weight: 600; }

        .caption {
            position: absolute;
            top: 85%;
            left: 50%;
            transform: translate(-50%, 20px);
            width: max-content;
            font-size: 1.1rem;
            font-weight: 700;
            color: #18181b;
            background: #ffffff;
            padding: 14px 28px;
            border-radius: 100px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.15), 0 0 0 1px rgba(0,0,0,0.05);
            opacity: 0;
            transition: opacity 0.4s ease, transform 0.4s ease;
            z-index: 100;
        }
        .caption.show {
            opacity: 1;
            transform: translate(-50%, 0);
        }
    </style>
</head>
<body>
    <div class="calendar-wrapper">
        <div class="calendar-window size-normal" id="window">
            <div class="header">April 2026</div>
            <div class="weekdays"><div>Su</div><div>Mo</div><div>Tu</div><div>We</div><div>Th</div><div>Fr</div><div>Sa</div></div>
            <div class="grid" id="grid-apr"></div>
        </div>
        
        <div class="caption" id="caption">Adjust for your comfort</div>
    </div>

    <script>
        function generateMonth(gridId, startDay, totalDays, selectStart, selectEnd) {
            const grid = document.getElementById(gridId);
            for (let i = 0; i < startDay; i++) {
                grid.innerHTML += `<div class="day empty"></div>`;
            }
            for (let i = 1; i <= totalDays; i++) {
                let classes = "day";
                if (selectStart && i >= selectStart && i <= selectEnd) {
                    classes += " selected";
                    if (i === selectStart) classes += " first";
                    if (i === selectEnd) classes += " last";
                }
                grid.innerHTML += `<div class="${classes}">${i}</div>`;
            }
        }

        generateMonth('grid-apr', 3, 30, 8, 15); // April 2026

        const win = document.getElementById('window');
        const cap = document.getElementById('caption');

        function playLoop() {
            // Sequence Reset (assumes starting from normal)
            win.className = 'calendar-window size-normal';
            cap.classList.remove('show');

            setTimeout(() => {
                win.className = 'calendar-window size-small';
                setTimeout(() => {
                    win.className = 'calendar-window size-large';
                    setTimeout(() => {
                        cap.classList.add('show');
                        setTimeout(() => {
                            win.style.transition = 'transform 0.4s ease'; 
                            win.className = 'calendar-window size-normal';
                            cap.classList.remove('show');
                            setTimeout(() => {
                                win.style.transition = ''; 
                                playLoop();
                            }, 500); 
                        }, 1800); 
                    }, 1200); 
                }, 1200); 
            }, 600);
        }

        window.addEventListener('load', () => setTimeout(playLoop, 1500));
    </script>
</body>
</html>
