<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeScope Social Animation</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f3f4f6; /* Soft gray to make the white calendar pop */
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .calendar {
            background-color: #ffffff;
            width: 380px;
            padding: 24px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08), 0 0 0 1px rgba(0,0,0,0.03);
            position: relative;
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.6s ease;
        }
        
        .calendar.shrink {
            transform: scale(0.75) translateY(-80px);
        }

        .header {
            font-size: 1.15rem;
            font-weight: 700;
            color: #18181b;
            margin-bottom: 20px; 
            text-align: left; 
            padding-left: 4px;
            letter-spacing: -0.01em;
        }

        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            font-size: 0.8rem;
            font-weight: 600;
            color: #71717a;
            margin-bottom: 8px;
        }
        
        .weekdays div:nth-child(1) { color: #e11d48; } 
        .weekdays div:nth-child(7) { color: #2563eb; } 

        .grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            row-gap: 6px;
            column-gap: 2px;
        }

        .day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.95rem;
            font-weight: 500;
            color: #18181b;
            position: relative;
            z-index: 1;
        }
        
        .day:nth-child(7n+1) { color: #e11d48; } 
        .day:nth-child(7n)   { color: #2563eb; } 
        
        .day.selected.first, .day.selected.last {
            color: #ffffff !important;
            font-weight: 600;
        }
        
        .day.empty { pointer-events: none; }

        .day::before {
            content: '';
            position: absolute;
            top: 0; bottom: 0; left: 0; right: 0;
            background-color: transparent;
            z-index: -2;
        }

        .day.selected { color: #18181b; }
        .day.selected::before { background-color: rgba(59, 130, 246, 0.15); }
        .day.selected.first::before { left: 50%; }
        .day.selected.last::before { right: 50%; }

        .day.selected.first::after, .day.selected.last::after {
            content: '';
            position: absolute;
            top: 0; bottom: 0; left: 0; right: 0;
            background-color: #5a92e6;
            border-radius: 50%;
            z-index: -1;
        }

        .popup-badge {
            position: absolute;
            top: 55%; 
            left: 50%;
            transform: translate(-50%, -50%) scale(0.7);
            background: #2563eb;
            border: 2px solid #ffffff;
            color: #ffffff;
            font-weight: 800;
            font-size: 1.6rem;
            padding: 14px 28px;
            border-radius: 100px;
            box-shadow: 0 16px 40px rgba(37,99,235,0.4), 0 0 0 4px rgba(255,255,255,0.8);
            opacity: 0;
            pointer-events: none;
            z-index: 10;
        }

        @keyframes popBadge {
            0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.7); }
            50%  { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
            100% { opacity: 1; transform: translate(-50%, -50%) scale(1.0); }
        }

        .popup-badge.show {
            animation: popBadge 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
    
        @keyframes calendarEntry {
            0% { transform: scale(0.96); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .calendar.enter {
            animation: calendarEntry 0.4s ease-out forwards;
        }

        /* Taskbar / Tray Guidance */
        .taskbar-mock {
            position: absolute;
            bottom: -250px;
            right: 40px;
            opacity: 0;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        .taskbar-mock.show {
            bottom: 60px;
            opacity: 1;
        }
        
        .tray-container {
            position: relative;
            display: flex;
            align-items: center;
        }
        
        .tray-img {
            height: 117px; 
            border-radius: 12px;
            box-shadow: 0 16px 40px rgba(0,0,0,0.2), 0 0 0 2px rgba(0,0,0,0.05);
        }
        
        /* Approximate position of the TimeScope icon in 2026-04-24 215813.png */
        .pulse-overlay {
            position: absolute;
            left: 17%; 
            top: 50%;
            transform: translateY(-50%);
            width: 104px;
            height: 125px;
            border-radius: 12px;
            background: rgba(255,255,255,0.1);
            opacity: 0;
            z-index: 5;
        }
        
        .pulse-overlay.pulse {
            animation: pulseGlow 1.2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        
        @keyframes pulseGlow {
            0% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.8); opacity: 1; }
            70% { box-shadow: 0 0 0 14px rgba(59, 130, 246, 0); opacity: 0.8; }
            100% { box-shadow: 0 0 0 0 rgba(59, 130, 246, 0); opacity: 0; }
        }
        
        .tray-text {
            position: absolute;
            top: -65px;
            left: 50%;
            transform: translateX(-50%) translateY(10px);
            background: #18181b;
            color: #fff;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 1.25rem;
            font-weight: 700;
            white-space: nowrap;
            opacity: 0;
            transition: all 0.4s ease;
            box-shadow: 0 12px 30px rgba(0,0,0,0.25);
            pointer-events: none;
        }
        
        /* Small triangle arrow for tooltip */
        .tray-text::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 6px 6px 0;
            border-style: solid;
            border-color: #18181b transparent transparent transparent;
        }
        
        .taskbar-mock.show .tray-text {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
            transition-delay: 0.4s;
        }

    </style>
</head>
<body>

    <div class="calendar enter" id="calendar">
        <div class="header">April 2026</div>
        <div class="weekdays">
            <div>Su</div><div>Mo</div><div>Tu</div><div>We</div><div>Th</div><div>Fr</div><div>Sa</div>
        </div>
        <div class="grid" id="grid">
            <!-- Dynamically generated days -->
        </div>

        <div class="popup-badge" id="popup">8 days</div>
    </div>
    
    <div class="taskbar-mock" id="taskbar">
        <div class="tray-container">
            <img src="assets/tray-hint.png" alt="System Tray" class="tray-img">
            <div class="pulse-overlay" id="pulse"></div>
            <div class="tray-text">Runs in the tray</div>
        </div>
    </div>

    <script>
        // Setup Grid
        const grid = document.getElementById('grid');
        const emptyDays = 3; 
        const totalDaysInMonth = 30;

        for (let i = 0; i < emptyDays; i++) {
            const div = document.createElement('div');
            div.className = 'day empty';
            grid.appendChild(div);
        }

        for (let i = 1; i <= totalDaysInMonth; i++) {
            const div = document.createElement('div');
            div.className = 'day';
            div.dataset.date = i;
            div.innerText = i;
            grid.appendChild(div);
        }

        // Animation Logic
        const days = document.querySelectorAll('.day[data-date]');
        const popup = document.getElementById('popup');
        const calendar = document.getElementById('calendar');
        const taskbar = document.getElementById('taskbar');
        const pulse = document.getElementById('pulse');
        
        let currentIndex = 0;
        const targetDays = 8; 
        const delayBeforeStart = 400;
        const dragDuration = 1000; 
        const interval = dragDuration / targetDays; // ~125ms
        const delayBeforePop = 300;
        const pauseAfterPop = 500;
        
        // Loop time: 400+1000+300+600(pop)+500+1000(tray) = 3800ms
        const pauseAtEnd = 1600; 

        function playAnimation() {
            if (currentIndex < targetDays) {
                const dateVal = currentIndex + 1;
                if (dateVal > 1) {
                    const prevD = Array.from(days).find(el => el.dataset.date == (dateVal - 1));
                    if (prevD) prevD.classList.remove('last');
                }
                const d = Array.from(days).find(el => el.dataset.date == dateVal);
                if (d) {
                    d.classList.add('selected', 'last');
                    if (dateVal === 1) d.classList.add('first');
                }
                currentIndex++;
                setTimeout(playAnimation, interval);
            } else {
                setTimeout(() => {
                    popup.classList.add('show');
                    
                    // Show Tray Hint
                    setTimeout(() => {
                        calendar.classList.add('shrink');
                        taskbar.classList.add('show');
                        
                        setTimeout(() => {
                            pulse.classList.add('pulse');
                        }, 400);
                        
                        setTimeout(resetAndLoop, pauseAtEnd);
                        
                    }, pauseAfterPop);
                    
                }, delayBeforePop);
            }
        }

        function resetAndLoop() {
            days.forEach(d => d.className = 'day');
            popup.classList.remove('show');
            popup.style.animation = 'none'; 
            void popup.offsetWidth;
            popup.style.animation = ''; 
            
            calendar.classList.remove('shrink');
            calendar.classList.remove('enter');
            void calendar.offsetWidth;
            calendar.classList.add('enter');
            
            taskbar.classList.remove('show');
            pulse.classList.remove('pulse');

            currentIndex = 0;
            setTimeout(playAnimation, delayBeforeStart);
        }

        window.addEventListener('load', () => {
            setTimeout(playAnimation, delayBeforeStart);
        });

    </script>
</body>
</html>
