<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeScope Hero Animation</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff; 
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        .calendar {
            background-color: #ffffff;
            width: 380px;
            padding: 24px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.06), 0 0 0 1px rgba(0,0,0,0.03);
            position: relative;
        }

        .header {
            font-size: 1.15rem;
            font-weight: 700;
            color: #18181b;
            margin-bottom: 20px; 
            text-align: left; 
            padding-left: 4px;
            letter-spacing: -0.01em;
        }

        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            font-size: 0.8rem;
            font-weight: 600;
            color: #71717a;
            margin-bottom: 8px;
        }
        
        .weekdays div:nth-child(1) { color: #e11d48; } /* Sunday Red */
        .weekdays div:nth-child(7) { color: #2563eb; } /* Saturday Blue */

        .grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            row-gap: 6px;
            column-gap: 2px; /* Thin white gap between cells */
        }

        .day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.95rem;
            font-weight: 500;
            color: #18181b;
            position: relative;
            z-index: 1;
        }
        
        /* Weekends styling in calendar grid */
        .day:nth-child(7n+1) { color: #e11d48; } /* Sunday Red */
        .day:nth-child(7n)   { color: #2563eb; } /* Saturday Blue */
        
        /* White text for Start and End nodes (overrides weekend colors) */
        .day.selected.first, .day.selected.last {
            color: #ffffff !important;
            font-weight: 600;
        }
        
        .day.empty {
            pointer-events: none;
        }

        /* Selection Background track */
        .day::before {
            content: '';
            position: absolute;
            top: 0; bottom: 0; left: 0; right: 0;
            background-color: transparent;
            z-index: -2;
        }

        .day.selected {
            color: #18181b;
        }
        .day.selected::before {
            background-color: rgba(59, 130, 246, 0.15); /* Light blue continuous track */
        }

        /* Start and End nodes override track padding so circles stick out naturally */
        .day.selected.first::before { left: 50%; }
        .day.selected.last::before { right: 50%; }

        /* Circular Dot for Start and End nodes */
        .day.selected.first::after, .day.selected.last::after {
            content: '';
            position: absolute;
            top: 0; bottom: 0; left: 0; right: 0;
            background-color: #5a92e6; /* Base blue matching reference */
            border-radius: 50%;
            z-index: -1;
        }

        /* Pop-up Badge inside the calendar container (absolute centered) */
        .popup-badge {
            position: absolute;
            top: 55%; 
            left: 50%;
            transform: translate(-50%, -50%) scale(0.7);
            background: #ffffff;
            border: 1px solid #e4e4e7;
            color: #18181b;
            font-weight: 700;
            font-size: 1rem;
            padding: 10px 20px;
            border-radius: 100px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.12);
            opacity: 0;
            pointer-events: none;
            z-index: 10;
        }

        @keyframes popBadge {
            0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.7); }
            50%  { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
            100% { opacity: 1; transform: translate(-50%, -50%) scale(1.0); }
        }

        .popup-badge.show {
            animation: popBadge 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
    </style>
</head>
<body>

    <div class="calendar">
        <div class="header">April 2026</div>
        <div class="weekdays">
            <div>Su</div><div>Mo</div><div>Tu</div><div>We</div><div>Th</div><div>Fr</div><div>Sa</div>
        </div>
        <div class="grid" id="grid">
            <!-- Dynamically generated days -->
        </div>

        <div class="popup-badge" id="popup">14 days</div>
    </div>

    <script>
        // Setup Grid: April 2026 starts on Wednesday
        const grid = document.getElementById('grid');
        const emptyDays = 3; // Sun, Mon, Tue
        const totalDaysInMonth = 30;

        for (let i = 0; i < emptyDays; i++) {
            const div = document.createElement('div');
            div.className = 'day empty';
            grid.appendChild(div);
        }

        for (let i = 1; i <= totalDaysInMonth; i++) {
            const div = document.createElement('div');
            div.className = 'day';
            div.dataset.date = i;
            div.innerText = i;
            grid.appendChild(div);
        }

        // Animation Logic
        const days = document.querySelectorAll('.day[data-date]');
        const popup = document.getElementById('popup');
        let currentIndex = 0;
        
        const targetDays = 15; 
        const delayBeforeStart = 400;
        const dragDuration = 2400; // total drag time
        const interval = dragDuration / targetDays; // ~53ms
        const delayBeforePop = 100;
        const pauseAtEnd = 999999; 

        function playAnimation() {
            if (currentIndex < targetDays) {
                const dateVal = currentIndex + 1;
                
                // Remove 'last' from the previous cell
                if (dateVal > 1) {
                    const prevD = Array.from(days).find(el => el.dataset.date == (dateVal - 1));
                    if (prevD) {
                        prevD.classList.remove('last');
                    }
                }

                // Add 'selected' and 'last' to the current cell
                const d = Array.from(days).find(el => el.dataset.date == dateVal);
                if (d) {
                    d.classList.add('selected', 'last');
                    if (dateVal === 1) {
                        d.classList.add('first');
                    }
                }
                
                currentIndex++;
                setTimeout(playAnimation, interval);
            } else {
                setTimeout(() => {
                    popup.classList.add('show');
                    setTimeout(resetAndLoop, pauseAtEnd);
                }, delayBeforePop);
            }
        }

        function resetAndLoop() {
            days.forEach(d => {
                d.className = 'day'; // clear selection completely
            });
            popup.classList.remove('show');
            popup.style.animation = 'none'; 
            void popup.offsetWidth;
            popup.style.animation = ''; 
            
            currentIndex = 0;
            setTimeout(playAnimation, delayBeforeStart);
        }

        window.addEventListener('load', () => {
            setTimeout(playAnimation, delayBeforeStart);
        });

    </script>
</body>
</html>
